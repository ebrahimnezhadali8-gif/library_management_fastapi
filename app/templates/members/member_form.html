{% extends "base.html" %}

{% block title %}
    {% if editing %}Edit Member{% else %}Add New Member{% endif %}
{% endblock %}

{% block content %}
<div class="container mt-3">
    <div class="card card-form mx-auto">
        <div class="card-header">
            <i class="fas {% if editing %}fa-edit{% else %}fa-plus-circle{% endif %}"></i>
            {% if editing %}Edit Member{% else %}Add New Member{% endif %}
        </div>
        <div class="card-body">
            {% if error %}
            <div class="alert alert-danger" style="background: #f8d7da; color: #721c24; padding: 0.75rem; border-radius: 12px; margin-bottom: 1rem;">
                <i class="fas fa-exclamation-triangle"></i> {{ error }}
            </div>
            {% endif %}

            <form method="post" action="{% if editing %}/members/{{ member_id }}{% else %}/members/{% endif %}">
                <!-- Member ID -->
                {% if editing %}
                <div class="form-group">
                    <label for="member_id">Member ID</label>
                    <input type="text" id="member_id" class="form-control" value="{{ member.member_id }}" disabled>
                    <input type="hidden" name="member_id" value="{{ member.member_id }}">
                </div>
                {% endif %}

                <!-- Name -->
                <div class="form-group">
                    <label for="name">Name *</label>
                    <input type="text" name="name" id="name" class="form-control"
                           value="{{ form_data.name if form_data else (member.name if member else '') }}" required>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" name="email" id="email" class="form-control"
                           value="{{ form_data.email if form_data else (member.email if member else '') }}" required>
                </div>

                <!-- Phone -->
                <div class="form-group">
                    <label for="phone">Phone</label>
                    <input type="text" name="phone" id="phone" class="form-control"
                           value="{{ form_data.phone if form_data else (member.phone if member else '') }}">
                </div>

                <div class="form-group mt-3 d-flex justify-content-between gap-2">
                    <a href="/members/landing" class="btn btn-danger">
                        <i class="fas fa-times"></i> Cancel
                    </a>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> {% if editing %}Update Member{% else %}Create Member{% endif %}
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
